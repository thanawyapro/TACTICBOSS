[build]
  command = "bash scripts/netlify-guaranteed-build.sh"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_VERSION = "10.8.2"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,OAUTH_REDIRECT_URL"
  SECRETS_SCAN_OMIT_PATHS = "dist/runtime-config.js,public/runtime-config.js,READ_ME_FIRST_GITHUB_DEPLOY_AR.md"

[[redirects]]
  from = "/api/vision-analysis"
  to = "/.netlify/functions/vision-analysis"
  status = 200

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
