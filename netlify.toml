[build]
  command = "echo 'Tactic Boss AI V130 prebuilt deploy: no npm install/build required'"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/vision-analysis"
  to = "/.netlify/functions/vision-analysis"
  status = 200

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
