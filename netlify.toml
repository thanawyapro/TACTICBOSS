[build]
  command = "echo 'Tactic Boss V131.10 prebuilt deploy: build already included'"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_VERSION = "10.8.2"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY"
  SECRETS_SCAN_OMIT_PATHS = "dist/runtime-config.js"

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
