[build]
  # V105.6 uses a prebuilt dist folder to avoid all Netlify npm install/build failures.
  # Do not change this to npm run build unless you want Netlify to install dependencies again.
  command = "echo 'Tactic Boss AI V105.6 prebuilt deploy: no npm install/build required'"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,OAUTH_REDIRECT_URL"
  SECRETS_SCAN_OMIT_PATHS = "dist/runtime-config.js,READ_ME_FIRST_V105_6_PREBUILT_AR.md"

[[redirects]]
  from = "/api/vision-analysis"
  to = "/.netlify/functions/vision-analysis"
  status = 200

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
