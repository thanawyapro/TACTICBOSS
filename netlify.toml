[build]
  command = "echo 'Tactic Boss AI V105.7 prebuilt deploy: no npm install/build required'"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,OAUTH_REDIRECT_URL"
  SECRETS_SCAN_OMIT_PATHS = "dist/runtime-config.js,dist/version.json"

[[redirects]]
  from = "/api/vision-analysis"
  to = "/.netlify/functions/vision-analysis"
  status = 200

[[redirects]]
  from = "/api/tactical-coach"
  to = "/.netlify/functions/tactical-coach"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
